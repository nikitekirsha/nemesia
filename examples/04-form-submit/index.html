<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form submit</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @layer components {
        .demo-page { @apply min-h-screen bg-slate-100 p-6 text-slate-900; }
        .demo-wrap { @apply mx-auto max-w-4xl space-y-4; }
        .demo-title { @apply text-2xl font-semibold; }
        .demo-subtitle { @apply text-sm text-slate-600; }
        .demo-panel { @apply rounded-xl border border-slate-300 bg-white p-4 space-y-3; }
        .demo-row { @apply flex flex-wrap items-center gap-2; }
        .demo-btn { @apply inline-flex h-10 items-center justify-center rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-800; }
        .demo-btn-primary { @apply border-blue-600 bg-blue-600 text-white; }
        .demo-input { @apply h-10 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-900; }
        .demo-textarea { @apply w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900; }
        .demo-badge { @apply inline-flex items-center rounded-full border border-slate-300 px-3 py-1 text-sm text-slate-600; }
        .field-label { @apply text-sm font-medium text-slate-700; }
        .field-error { @apply min-h-5 text-sm text-rose-700; }
        .response-box { @apply min-h-6 text-sm; }
        .response-box-success { @apply rounded-lg border border-emerald-300 bg-emerald-50 px-3 py-2 text-emerald-700; }
        .response-box-error { @apply rounded-lg border border-rose-300 bg-rose-50 px-3 py-2 text-rose-700; }
      }
    </style>
  </head>

  <body class="demo-page">
    <div class="demo-wrap">
      <h1 class="demo-title">Reusable Form Submit</h1>
      <p class="demo-subtitle">Fields are discovered automatically, validated by data-attributes, and submitted to endpoint from options.</p>

      <form
        class="demo-panel"
        data-form
        data-form-endpoint="/api/forms/contact"
        data-form-success-text="Request accepted."
        novalidate
      >
        <div class="grid gap-1.5">
          <div class="field-label">Full Name</div>

          <input
            class="demo-input"
            data-error-message="Use letters, spaces, apostrophe or dash."
            data-form-field
            data-required-message="Name is required."
            data-validate="personName"
            name="fullName"
            placeholder="Jane Doe"
            required
          />

          <div class="field-error" data-error-for="fullName"></div>
        </div>

        <div class="grid gap-1.5">
          <div class="field-label">Email</div>

          <input
            class="demo-input"
            data-error-message="Please provide a valid email."
            data-form-field
            data-required-message="Email is required."
            data-validate="email"
            name="email"
            placeholder="jane@company.com"
            required
            type="email"
          />

          <div class="field-error" data-error-for="email"></div>
        </div>

        <div class="grid gap-1.5">
          <div class="field-label">Message</div>

          <textarea
            class="demo-textarea"
            data-error-message="Message should be at least 10 characters."
            data-form-field
            data-required-message="Message is required."
            data-validate="message"
            name="message"
            placeholder="Tell us about your use case"
            required
            rows="4"
          ></textarea>

          <div class="field-error" data-error-for="message"></div>
        </div>

        <div class="demo-row">
          <button class="demo-btn demo-btn-primary" data-submit type="submit">Send</button>
          <span class="demo-badge" data-status>idle</span>
        </div>

        <div class="response-box" data-response></div>
      </form>
    </div>

    <script src="./main.ts" type="module"></script>
  </body>
</html>
